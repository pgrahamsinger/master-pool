services:
  - type: web
    name: masters-pool
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/state
    envVars:
      - key: NODE_ENV
        value: production
      # Set ROOM_CODE to a fixed value (e.g. MASTERS26) so the room code
      # survives redeploys. Set ADMIN_PASSWORD to override the default.
      # You can also set these in the Render dashboard under Environment.
      - key: ROOM_CODE
        value: MAST26
      - key: ADMIN_PASSWORD
        value: masters2026
      # These two are managed in the Render dashboard (not synced from this file)
      # so your secrets are never committed to GitHub.
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
